<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinAndZsh - 个人主页</title>
  <!-- 引入外部资源 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- 配置Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8B5CF6',
            secondary: '#EC4899',
            dark: '#1a1a2e',
          }
        }
      }
    }
  </script>
  
  <style>
    /* 统一首页专属样式 */
    .hero-gradient {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
      50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.6); }
    }
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body class="hero-gradient min-h-screen">
  
  <!-- 导航栏 -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/5 backdrop-blur-md border-b border-white/10">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <i class="fa fa-star text-primary text-2xl"></i>
        <span class="font-bold text-xl text-white">SinAndZsh</span>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="pt-32 pb-20 px-4">
    <div class="container mx-auto max-w-5xl">
      
      <!-- 标题区域 -->
      <div class="text-center mb-16">
        <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-bold mb-6 text-white">
          欢迎来到我的<span class="gradient-text">个人空间</span>
        </h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto">
          这里是 SinAndZsh 的个人网站，包含学习资料和私人空间
        </p>
      </div>
      
      <!-- 功能卡片区 -->
      <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
        
        <!-- 外刊精读卡片 -->
        <a href="reading/index.html" class="card-hover block bg-white/10 backdrop-blur-sm rounded-2xl p-8 border border-white/20">
          <div class="flex items-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl flex items-center justify-center mr-5 float-animation">
              <i class="fa fa-book text-white text-2xl"></i>
            </div>
            <div>
              <h2 class="text-2xl font-bold text-white">📚 每日外刊精读</h2>
              <p class="text-purple-400 text-sm">考研英语备考</p>
            </div>
          </div>
          <p class="text-gray-300 mb-6 leading-relaxed">
            每天精选一篇纽约时报、大西洋月刊、经济学人等外刊，配有详细的词汇注释和长难句解析，助你考研英语一臂之力。
          </p>
          <div class="flex flex-wrap gap-2">
            <span class="bg-purple-500/30 text-purple-300 px-3 py-1 rounded-full text-sm">考研必备</span>
            <span class="bg-blue-500/30 text-blue-300 px-3 py-1 rounded-full text-sm">每日更新</span>
            <span class="bg-green-500/30 text-green-300 px-3 py-1 rounded-full text-sm">点击查词</span>
          </div>
          <div class="mt-6 flex items-center text-primary">
            <span class="font-semibold">开始学习</span>
            <i class="fa fa-arrow-right ml-2"></i>
          </div>
        </a>
        
        <!-- 想你 sin 卡片 -->
        <a href="sin.html" class="card-hover block bg-white/10 backdrop-blur-sm rounded-2xl p-8 border border-white/20">
          <div class="flex items-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-rose-600 rounded-2xl flex items-center justify-center mr-5 float-animation" style="animation-delay: 0.5s;">
              <i class="fa fa-heart text-white text-2xl"></i>
            </div>
            <div>
              <h2 class="text-2xl font-bold text-white">💕 想你 sin</h2>
              <p class="text-pink-400 text-sm">私人纪念空间</p>
            </div>
          </div>
          <p class="text-gray-300 mb-6 leading-relaxed">
            记录美好瞬间，珍藏春竹的照片和回忆。正弦曲线般的思念，循环往复，永不消散。
          </p>
          <div class="flex flex-wrap gap-2">
            <span class="bg-pink-500/30 text-pink-300 px-3 py-1 rounded-full text-sm">照片墙</span>
            <span class="bg-red-500/30 text-red-300 px-3 py-1 rounded-full text-sm">思念曲线</span>
            <span class="bg-orange-500/30 text-orange-300 px-3 py-1 rounded-full text-sm">留言墙</span>
          </div>
          <div class="mt-6 flex items-center text-pink-500">
            <span class="font-semibold">进入空间</span>
            <i class="fa fa-arrow-right ml-2"></i>
          </div>
        </a>
        
      </div>
      
      <!-- 统计信息 -->
      <div class="mt-16 grid grid-cols-3 gap-4 max-w-2xl mx-auto">
        <div class="text-center p-4 bg-white/5 rounded-xl border border-white/10">
          <div class="text-3xl font-bold gradient-text mb-1">1000+</div>
          <div class="text-gray-500 text-sm">词汇量/篇</div>
        </div>
        <div class="text-center p-4 bg-white/5 rounded-xl border border-white/10">
          <div class="text-3xl font-bold gradient-text mb-1">5</div>
          <div class="text-gray-500 text-sm">外刊来源</div>
        </div>
        <div class="text-center p-4 bg-white/5 rounded-xl border border-white/10">
          <div class="text-3xl font-bold gradient-text mb-1">∞</div>
          <div class="text-gray-500 text-sm">思念无限</div>
        </div>
      </div>
      
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="py-8 px-4 border-t border-white/10">
    <div class="container mx-auto text-center text-gray-500 text-sm">
      <p>© 2025-2026 SinAndZsh · 保留所有权利</p>
    </div>
  </footer>
  
</body>
</html>

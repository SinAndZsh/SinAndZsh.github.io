<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考研英语外刊精读 | 每日阅读</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a365d;
      --primary-light: #2c5282;
      --accent: #c53030;
      --bg: #f7fafc;
      --card-bg: #ffffff;
      --text: #2d3748;
      --text-light: #4a5568;
      --text-muted: #718096;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 60px 0 40px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    .subtitle { opacity: 0.9; font-size: 1.05rem; }
    .article-list { display: grid; gap: 20px; }
    .article-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 28px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .article-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
      border-color: #90cdf4;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-source {
      background: #ebf8ff;
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .card-date {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .card-desc {
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-tag {
      background: var(--bg);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>&#128218; 考研英语外刊精读</h1>
      <p class="subtitle">每日精选《经济学人》《纽约时报》《卫报》等权威外刊，助力考研英语备考</p>
    </div>
  </header>

  <main class="container">
    <div class="article-list">
      <a href="20250625_economist_jobs_apocalypse.html" class="article-card">
        <div class="card-header">
          <span class="card-source">The Economist</span>
          <span class="card-date">2026-06-25</span>
        </div>
        <div class="card-title">The Jobs Apocalypse: A Short History</div>
        <div class="card-desc">人工智能会导致大规模失业吗？本文通过回顾农业革命、20世纪技术变革和英国工业革命等历史案例，论证技术变革虽会改变就业结构，但从未造成灾难性失业，为理解AI时代的就业前景提供历史视角。</div>
        <div class="card-tags">
          <span class="card-tag">&#9201; 约1500词</span>
          <span class="card-tag">&#127919; 考研英语一难度</span>
          <span class="card-tag">&#128200; 经济/科技</span>
          <span class="card-tag">&#9997; 含3道阅读练习题</span>
        </div>
      </a>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>外刊精读 · 每日更新 · 考研备考</p>
    </div>
  </footer>
</body>
</html>
